<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WebSocket Chat</h1>
        <div id="status" class="status disconnected">Déconnecté</div>
        <div id="messages"></div>
        <div class="input-row">
            <input type="text" id="input" placeholder="Écrire un message..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">Envoyer</button>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
